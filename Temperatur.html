<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enzym & Substratzufuhr</title>

<style>
body{
    margin:0;
    background:#eef2f7;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:1000px;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
}

label{
    font-size:18px;
    font-weight:bold;
}

input{
    width:100%;
}

canvas{
    display:block;
    margin:auto;
    background:white;
    border:2px solid #cbd5e1;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<label>
Temperatur:
<span id="temp">25</span> °C
</label>

<input type="range" id="slider" min="0" max="60" value="25">

<canvas id="canvas" width="950" height="550"></canvas>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");
const tempLabel = document.getElementById("temp");

let temperature = 25;

const enzymes = [];
const substrates = [];
const products = [];

const ENZYMES = 8;

// ---------------- ENZYM ----------------
class Enzym{

    constructor(x,y){
        this.x=x;
        this.y=y;

        this.busy=false;
        this.timer=0;
        this.substrate=null;

        this.denatured=false;
    }

    draw(){

        ctx.beginPath();

        ctx.fillStyle = this.denatured ? "#9ca3af"
                      : this.busy ? "#f59e0b"
                      : "#2563eb";

        ctx.arc(this.x,this.y,45,0,Math.PI*2);
        ctx.fill();

        // aktive Tasche (Krone)
        ctx.beginPath();

        if(this.denatured){

            ctx.fillStyle="#e5e7eb";
            ctx.rect(this.x-20,this.y-12,40,24);

        } else {

            ctx.fillStyle="white";

            ctx.moveTo(this.x-18,this.y+15);
            ctx.lineTo(this.x-6,this.y-10);
            ctx.lineTo(this.x,this.y+5);
            ctx.lineTo(this.x+6,this.y-10);
            ctx.lineTo(this.x+18,this.y+15);
            ctx.closePath();
        }

        ctx.fill();

        // gebundenes Substrat
        if(this.busy && !this.denatured){

            ctx.beginPath();
            ctx.fillStyle="#22c55e";

            ctx.moveTo(this.x-18,this.y+15);
            ctx.lineTo(this.x-6,this.y-10);
            ctx.lineTo(this.x,this.y+5);
            ctx.lineTo(this.x+6,this.y-10);
            ctx.lineTo(this.x+18,this.y+15);

            ctx.closePath();
            ctx.fill();
        }
    }

    update(){

        if(this.denatured) return;

        if(this.busy){

            this.timer--;

            if(this.timer<=0){

                products.push({
                    x:this.x,
                    y:this.y,
                    dx:(Math.random()-0.5)*5,
                    dy:(Math.random()-0.5)*5,
                    life:120
                });

                const i=substrates.indexOf(this.substrate);
                if(i>-1) substrates.splice(i,1);

                this.busy=false;
                this.substrate=null;
            }
        }
    }
}

// ---------------- SUBSTRAT ----------------
class Substrat{

    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;

        this.dx=(Math.random()-0.5)*2;
        this.dy=(Math.random()-0.5)*2;

        this.bound=false;
    }

    draw(){

        if(this.bound) return;

        ctx.beginPath();
        ctx.fillStyle="#22c55e";

        ctx.moveTo(this.x-18,this.y+15);
        ctx.lineTo(this.x-6,this.y-10);
        ctx.lineTo(this.x,this.y+5);
        ctx.lineTo(this.x+6,this.y-10);
        ctx.lineTo(this.x+18,this.y+15);

        ctx.closePath();
        ctx.fill();
    }

    update(){

        if(this.bound) return;

        let speed = 0.3 + (temperature/60)*5;

        this.x += this.dx*speed;
        this.y += this.dy*speed;

        if(this.x<0) this.x=canvas.width;
        if(this.x>canvas.width) this.x=0;
        if(this.y<0) this.y=canvas.height;
        if(this.y>canvas.height) this.y=0;

        for(let e of enzymes){

            if(e.busy || e.denatured) continue;

            let d=Math.hypot(this.x-e.x,this.y-e.y);

            if(d<40){

                this.bound=true;

                e.busy=true;
                e.timer=80;
                e.substrate=this;

                this.x=e.x;
                this.y=e.y;

                break;
            }
        }
    }
}

// ---------------- INIT ----------------
function init(){

    enzymes.length=0;

    for(let i=0;i<ENZYMES;i++){

        enzymes.push(new Enzym(
            140+(i%4)*220,
            170+Math.floor(i/4)*220
        ));
    }
}

// ---------------- TEMP ----------------
function applyTemp(){

    for(let e of enzymes){

        if(temperature>=40){
            e.denatured=true;
            e.busy=false;
        }
    }
}

// ---------------- SUBSTRAT ZUFUHR (NEU!) ----------------
let spawnTimer = 0;

function spawnSubstrates(){

    spawnTimer++;

    // kontinuierliche Zufuhr
    if(spawnTimer % 15 === 0){
        substrates.push(new Substrat());
    }
}

// ---------------- PRODUCTS ----------------
function updateProducts(){

    for(let i=products.length-1;i>=0;i--){

        let p=products[i];

        p.x+=p.dx;
        p.y+=p.dy;

        p.life--;

        if(p.life<=0) products.splice(i,1);
    }
}

function drawProducts(){

    for(let p of products){

        ctx.beginPath();
        ctx.fillStyle="#ef4444";
        ctx.arc(p.x,p.y,5,0,Math.PI*2);
        ctx.fill();
    }
}

// ---------------- LOOP ----------------
function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    applyTemp();
    spawnSubstrates();

    for(let s of substrates){
        s.update();
        s.draw();
    }

    for(let e of enzymes){
        e.update();
        e.draw();
    }

    updateProducts();
    drawProducts();

    requestAnimationFrame(animate);
}

// ---------------- SLIDER ----------------
slider.addEventListener("input",()=>{

    temperature=Number(slider.value);
    tempLabel.textContent=temperature;
});

// ---------------- START ----------------
init();
animate();

</script>

</body>
</html>
